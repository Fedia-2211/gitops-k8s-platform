name: Build and Push Status App

on:
  push:
    branches: [main]
    paths:
      - 'apps/status-app/**'

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: gitops-k8s-platform/status-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./apps/status-app
          docker push $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Update Helm values with new image tag
        run: |
          sed -i "s|tag:.*|tag: \"${{ env.IMAGE_TAG }}\"|" helm/status-app/values.yaml

      - name: Commit and push updated values
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add helm/status-app/values.yaml
          git commit -m "Update status-app image to ${{ env.IMAGE_TAG }}" || echo "No changes"
          git push
