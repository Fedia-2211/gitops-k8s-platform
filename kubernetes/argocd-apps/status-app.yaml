apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: status-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Fedia-2211/gitops-k8s-platform.git
    targetRevision: main
    path: helm/status-app
  destination:
    server: https://kubernetes.default.svc
    namespace: status
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
